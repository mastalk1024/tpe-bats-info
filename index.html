<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏒 TPE Bats 資訊站</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #fff; padding: 12px; font-size: 15px; }
  h1 { color: #ff0000; font-size: 20px; margin-bottom: 2px; }
  .subtitle { color: #888; font-size: 12px; margin-bottom: 14px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tab { flex: 1; padding: 12px 8px; border-radius: 10px; cursor: pointer; background: #222; color: #aaa; border: none; font-size: 14px; text-align: center; font-weight: bold; }
  .tab.active { background: #ff0000; color: #fff; }
  .panel { display: none; }
  .panel.active { display: block; }
  input[type=text] { background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 10px; padding: 12px; font-size: 14px; width: 100%; margin-bottom: 8px; }
  .section-title { font-size: 14px; color: #aaa; margin: 16px 0 8px; border-bottom: 1px solid #222; padding-bottom: 6px; }

  /* 行事曆 */
  #cal-frame { border: 0; width: 100%; height: calc(100vh - 130px); min-height: 500px; border-radius: 10px; }

  /* 培訓隊 */
  .ct-btns { display: flex; gap: 8px; margin-bottom: 14px; }
  .ct-btns button { flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; border: none; font-size: 18px; font-weight: bold; }
  .btn-active { background: #ff0000; color: #fff; }
  .btn-gray { background: #333; color: #aaa; }
  .game-card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .game-card-today { background: #0a2a4a; border-color: #3498db; }
  .game-card-past { background: #111; border-color: #2a2a2a; }
  .game-date { font-weight: bold; font-size: 18px; margin-bottom: 8px; }
  .game-row { display: flex; align-items: center; gap: 6px; padding: 5px 0; border-bottom: 1px solid #1e1e1e; font-size: 17px; }
  .game-row:last-child { border-bottom: none; }
  .g-num { color: #888; min-width: 24px; font-weight: bold; }
  .g-time { color: #aaa; font-size: 15px; white-space: nowrap; min-width: 110px; }
  .g-team { flex: 1; font-weight: bold; }
  .g-vs { color: #555; font-size: 15px; }
  .team-card { background: #1a1a1a; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .team-name { font-weight: bold; margin-bottom: 8px; font-size: 18px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .ptag { background: #222; border-radius: 6px; padding: 4px 10px; font-size: 17px; color: #ddd; }
  .badge { background: #3498db; color: #fff; border-radius: 5px; padding: 1px 7px; font-size: 15px; margin-left: 6px; }
  .badge-past { background: #333; color: #888; }
  .month-title { font-size: 19px; color: #ccc; font-weight: bold; margin: 16px 0 10px; border-bottom: 1px solid #222; padding-bottom: 6px; }

  /* 訓練表 */
  .train-card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .train-card-today { background: #0a2a4a; border-color: #3498db; }
  .train-card-past { background: #111; border-color: #2a2a2a; }
  .train-date { font-weight: bold; font-size: 18px; margin-bottom: 8px; }
  .train-session { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid #1e1e1e; font-size: 17px; }
  .train-session:last-child { border-bottom: none; }
  .group-badge { border-radius: 5px; padding: 2px 8px; font-size: 15px; font-weight: bold; white-space: nowrap; min-width: 52px; text-align: center; }
  .session-label { color: #888; font-size: 15px; white-space: nowrap; min-width: 65px; }
  .session-times { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .time-row { display: flex; align-items: center; gap: 6px; }
  .time-type { font-size: 15px; padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
  .type-fitness { background: #2c1810; color: #e8835a; }
  .type-ice { background: #0d1f35; color: #5ab3e8; }
  .train-note { display: inline-block; background: #5a2d0c; color: #f0a070; font-size: 15px; padding: 1px 8px; border-radius: 4px; margin-left: 8px; }
</style>
</head>

<p class="subtitle">行事曆 ＋ 國家培訓隊資訊</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('calendar', this)">📅 行事曆</button>
  <button class="tab" onclick="switchTab('ct', this)">🏒 培訓隊</button>
</div>

<!-- 行事曆 -->
<div id="tab-calendar" class="panel active">
  <iframe id="cal-frame"
    src="https://calendar.google.com/calendar/embed?src=khe3f3dl9stgbac0s065ngchgc%40group.calendar.google.com&color=%23457357&src=km302edatkfnab5c6pbiov357c%40group.calendar.google.com&color=%2348eb28&src=n49hmtqf92j6p9u34hsu12k91s%40group.calendar.google.com&color=%2300C6C6&ctz=Asia%2FTaipei&mode=AGENDA&showCalendars=1&showTitle=0&showTabs=1&showNav=1&showPrint=0&showTz=0"
    frameborder="0" scrolling="no"></iframe>
</div>

<!-- 培訓隊 -->
<div id="tab-ct" class="panel">
  <div class="ct-btns">
    <button id="ct-btn-s" class="btn-active" onclick="ctSwitch('s')">📅 比賽賽程</button>
    <button id="ct-btn-t" class="btn-gray" onclick="ctSwitch('t')">🗓 訓練表</button>
    <button id="ct-btn-r" class="btn-gray" onclick="ctSwitch('r')">👥 球員名單</button>
  </div>
  <div id="ct-s"></div>
  <div id="ct-t" style="display:none"></div>
  <div id="ct-r" style="display:none">
    <input type="text" id="ct-search" placeholder="🔍 搜尋球員姓名..." oninput="ctSearch(this.value)">
    <div id="ct-roster-wrap"></div>
  </div>
</div>

<script>
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  el.classList.add('active');
}

function ctSwitch(tab) {
  document.getElementById('ct-s').style.display = tab==='s' ? 'block' : 'none';
  document.getElementById('ct-t').style.display = tab==='t' ? 'block' : 'none';
  document.getElementById('ct-r').style.display = tab==='r' ? 'block' : 'none';
  document.getElementById('ct-btn-s').className = tab==='s' ? 'btn-active' : 'btn-gray';
  document.getElementById('ct-btn-t').className = tab==='t' ? 'btn-active' : 'btn-gray';
  document.getElementById('ct-btn-r').className = tab==='r' ? 'btn-active' : 'btn-gray';
  if (tab==='r' && !document.getElementById('ct-roster-wrap').innerHTML) renderRoster();
  if (tab==='t' && !document.getElementById('ct-t').innerHTML) renderTraining();
  if (tab==='s') {
    setTimeout(() => {
      const el = document.querySelector('#ct-s .game-card:not(.game-card-past)');
      if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 0);
  } else if (tab==='t') {
    setTimeout(() => {
      const el = document.querySelector('#ct-t .train-card:not(.train-card-past)');
      if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
    }, 0);
  }
}

function renderSchedule() {
  const now = new Date();
  const todayMd = String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
  let html = '';
  CT_SCHEDULE.forEach(m => {
    html += `<div class="month-title">🗓 ${m.month} 比賽日</div>`;
    m.days.forEach(d => {
      const isPast = d.md < todayMd;
      const isToday = d.md === todayMd;
      const cardClass = isToday ? 'game-card game-card-today' : isPast ? 'game-card game-card-past' : 'game-card';
      const dateColor = isToday ? '#5af' : isPast ? '#555' : '#fff';
      const badge = isToday
        ? `<span class="badge">今天</span>`
        : isPast ? `<span class="badge badge-past">結束</span>` : '';
      html += `<div class="${cardClass}">
        <div class="game-date" style="color:${dateColor}">📅 ${d.date}（${d.day}）${badge}</div>`;
      d.games.forEach(g => {
        const isFemale = g.home.startsWith('女') || g.away.startsWith('女');
        const c = isFemale ? '#e74c3c' : '#3498db';
        const hGK = g.homeGK ? `<div style="font-size:14px;color:#777;font-weight:normal;margin-top:2px">${g.homeGK.join('、')}</div>` : '';
        const aGK = g.awayGK ? `<div style="font-size:14px;color:#777;font-weight:normal;margin-top:2px">${g.awayGK.join('、')}</div>` : '';
        html += `<div class="game-row" style="align-items:flex-start">
          <span class="g-num" style="padding-top:2px">G${g.g}</span>
          <span class="g-time" style="padding-top:2px">${g.time}</span>
          <div class="g-team" style="text-align:right;color:${c}">${g.home}${hGK}</div>
          <span class="g-vs" style="padding-top:2px">vs</span>
          <div class="g-team" style="color:${c}">${g.away}${aGK}</div>
        </div>`;
      });
      html += '</div>';
    });
  });
  document.getElementById('ct-s').innerHTML = html;
}

function renderRoster() {
  let html = '';
  Object.entries(CT_ROSTER).forEach(([team, players]) => {
    const isMale = team.startsWith('男');
    const c = isMale ? '#3498db' : '#e74c3c';
    html += `<div class="team-card" style="border-left:4px solid ${c}" data-team="${team}">
      <div class="team-name" style="color:${c}">${team} <span style="color:#666;font-size:16px;font-weight:normal">${players.length}人</span></div>
      <div class="tags">
        ${players.map(p=>`<span class="ptag">${p}</span>`).join('')}
      </div>
    </div>`;
  });
  document.getElementById('ct-roster-wrap').innerHTML = html;
}

function ctSearch(q) {
  if (!document.getElementById('ct-roster-wrap').innerHTML) renderRoster();
  q = q.trim();
  document.querySelectorAll('.team-card').forEach(card => {
    const tags = card.querySelectorAll('.ptag');
    let found = 0;
    tags.forEach(t => {
      const match = !q || t.textContent.includes(q);
      t.style.background = (match && q) ? '#1a3a5a' : '#222';
      t.style.color = (match && q) ? '#fff' : '#ddd';
      if (match) found++;
    });
    card.style.display = (!q || found > 0) ? '' : 'none';
  });
}

const GROUP_COLORS = {
  'ABCD': { bg:'#143d1f', fg:'#4ec96e' },
  'EFGH': { bg:'#3d2a09', fg:'#e8a040' },
  'IJKL': { bg:'#1a1050', fg:'#8888ff' },
};

function renderTraining() {
  const now = new Date();
  const todayMd = String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');

  // 合併訓練日 + 比賽日，依日期排序
  const allDays = [];
  CT_TRAINING.forEach(m => m.days.forEach(d => allDays.push({...d, type:'train', month:m.month})));
  CT_SCHEDULE.forEach(m => m.days.forEach(d => allDays.push({...d, type:'match', month:m.month})));
  allDays.sort((a,b) => a.md.localeCompare(b.md));

  let html = '';
  let curMonth = '';
  allDays.forEach(d => {
    if (d.month !== curMonth) {
      curMonth = d.month;
      html += `<div class="month-title">📆 ${curMonth}</div>`;
    }
    const isPast = d.md < todayMd;
    const isToday = d.md === todayMd;
    const cardClass = isToday ? 'train-card train-card-today' : isPast ? 'train-card train-card-past' : 'train-card';
    const dateColor = isToday ? '#5af' : isPast ? '#555' : '#fff';
    const badge = isToday ? `<span class="badge">今天</span>` : isPast ? `<span class="badge badge-past">結束</span>` : '';

    if (d.type === 'match') {
      const noteHtml = `<span class="train-note">⚔️ 比賽日</span>`;
      html += `<div class="${cardClass}" style="border-left:3px solid #e74c3c">
        <div class="train-date" style="color:${dateColor}">📅 ${d.date}（${d.day}）${badge}${noteHtml}</div>`;
      d.games.forEach(g => {
        const isFemale = g.home.startsWith('女') || g.away.startsWith('女');
        const c = isFemale ? '#e74c3c' : '#3498db';
        const hGK = g.homeGK ? `<div style="font-size:14px;color:#777;font-weight:normal;margin-top:2px">${g.homeGK.join('、')}</div>` : '';
        const aGK = g.awayGK ? `<div style="font-size:14px;color:#777;font-weight:normal;margin-top:2px">${g.awayGK.join('、')}</div>` : '';
        html += `<div class="game-row" style="align-items:flex-start">
          <span class="g-num" style="padding-top:2px">G${g.g}</span>
          <span class="g-time" style="padding-top:2px">${g.time}</span>
          <div class="g-team" style="text-align:right;color:${c}">${g.home}${hGK}</div>
          <span class="g-vs" style="padding-top:2px">vs</span>
          <div class="g-team" style="color:${c}">${g.away}${aGK}</div>
        </div>`;
      });
      html += '</div>';
    } else {
      const noteHtml = d.note ? `<span class="train-note">${d.note}</span>` : '';
      html += `<div class="${cardClass}">
        <div class="train-date" style="color:${dateColor}">🏋️ ${d.date}（${d.day}）${badge}${noteHtml}</div>`;
      d.sessions.forEach(s => {
        const gc = GROUP_COLORS[s.group] || {bg:'#222',fg:'#aaa'};
        html += `<div class="train-session">
          <span class="session-label">${s.label}</span>
          <span class="group-badge" style="background:${gc.bg};color:${gc.fg}">${s.group}</span>
          <div class="session-times">
            <div class="time-row"><span class="time-type type-fitness">體能</span><span style="color:#aaa;font-size:16px">${s.fitness}</span></div>
            <div class="time-row"><span class="time-type type-ice">冰上</span><span style="color:#aaa;font-size:16px">${s.ice}</span></div>
          </div>
        </div>`;
      });
      html += '</div>';
    }
  });
  document.getElementById('ct-t').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', () => { renderSchedule(); });
